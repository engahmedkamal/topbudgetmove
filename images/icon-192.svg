<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5734a"/>
      <stop offset="100%" style="stop-color:#e55a2f"/>
    </linearGradient>
    <linearGradient id="truck192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="90" fill="url(#bg192)"/>

  <!-- Truck -->
  <g transform="translate(22, 55)">
    <!-- Truck body -->
    <rect x="0" y="18" width="75" height="42" rx="4" fill="url(#truck192)"/>
    <!-- Truck cabin -->
    <path d="M75 28 L75 60 L108 60 L108 42 L92 28 Z" fill="url(#truck192)"/>
    <!-- Cabin window -->
    <path d="M79 32 L79 52 L102 52 L102 42 L90 32 Z" fill="#a8d4ff"/>
    <!-- Wheels -->
    <circle cx="22" cy="64" r="11" fill="#333"/>
    <circle cx="22" cy="64" r="5.5" fill="#777"/>
    <circle cx="94" cy="64" r="11" fill="#333"/>
    <circle cx="94" cy="64" r="5.5" fill="#777"/>
    <!-- Moving boxes -->
    <rect x="6" y="24" width="24" height="24" fill="#ffeaa7" stroke="#fff" stroke-width="1.5"/>
    <line x1="6" y1="36" x2="30" y2="36" stroke="#1a2b5f" stroke-width="1"/>
    <rect x="34" y="30" width="18" height="18" fill="#fff8f3" stroke="#fff" stroke-width="1.5"/>
  </g>
</svg>
