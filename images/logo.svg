<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
  </defs>

  <!-- Truck icon -->
  <g transform="translate(5, 15)">
    <!-- Truck body -->
    <rect x="0" y="18" width="35" height="22" rx="3" fill="url(#logoGrad)"/>
    <!-- Truck cabin -->
    <path d="M35 22 L35 40 L52 40 L52 30 L44 22 Z" fill="url(#logoGrad)"/>
    <!-- Cabin window -->
    <path d="M37 25 L37 34 L48 34 L48 29 L43 25 Z" fill="#a8d4ff"/>
    <!-- Wheels -->
    <circle cx="12" cy="42" r="6" fill="#333"/>
    <circle cx="12" cy="42" r="3" fill="#888"/>
    <circle cx="44" cy="42" r="6" fill="#333"/>
    <circle cx="44" cy="42" r="3" fill="#888"/>
    <!-- Moving boxes -->
    <rect x="4" y="22" width="12" height="12" fill="#ffeaa7" stroke="#1a2b5f" stroke-width="1"/>
    <rect x="18" y="25" width="10" height="9" fill="#fff8f3" stroke="#1a2b5f" stroke-width="1"/>
    <!-- Speed lines -->
    <line x1="-8" y1="28" x2="-2" y2="28" stroke="#f5734a" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="34" x2="-3" y2="34" stroke="#f5734a" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="40" x2="-1" y2="40" stroke="#f5734a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text: Top -->
  <text x="70" y="38" font-family="Poppins, sans-serif" font-size="28" font-weight="800" fill="#f5734a">Top</text>
  <!-- Text: Budget -->
  <text x="115" y="38" font-family="Poppins, sans-serif" font-size="28" font-weight="800" fill="#1a2b5f">Budget</text>
  <!-- Text: Move -->
  <text x="70" y="65" font-family="Poppins, sans-serif" font-size="28" font-weight="800" fill="#1a2b5f">Move</text>

  <!-- Tagline -->
  <text x="143" y="65" font-family="Poppins, sans-serif" font-size="11" font-weight="500" fill="#666">Flat Rate Moving</text>
</svg>
