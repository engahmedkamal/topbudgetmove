<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5734a"/>
      <stop offset="100%" style="stop-color:#e55a2f"/>
    </linearGradient>
    <linearGradient id="truck512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
    <filter id="shadow512" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg512)"/>

  <!-- Truck with shadow -->
  <g transform="translate(55, 140)" filter="url(#shadow512)">
    <!-- Truck body -->
    <rect x="0" y="50" width="200" height="110" rx="8" fill="url(#truck512)"/>
    <!-- Truck cabin -->
    <path d="M200 70 L200 160 L290 160 L290 110 L248 70 Z" fill="url(#truck512)"/>
    <!-- Cabin window -->
    <path d="M210 82 L210 140 L275 140 L275 108 L243 82 Z" fill="#a8d4ff"/>
    <!-- Window reflection -->
    <path d="M215 87 L215 100 L240 100 L240 92 L228 87 Z" fill="#c8e4ff" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="60" cy="170" r="30" fill="#333"/>
    <circle cx="60" cy="170" r="15" fill="#777"/>
    <circle cx="60" cy="170" r="5" fill="#555"/>
    <circle cx="250" cy="170" r="30" fill="#333"/>
    <circle cx="250" cy="170" r="15" fill="#777"/>
    <circle cx="250" cy="170" r="5" fill="#555"/>
    <!-- Moving boxes -->
    <rect x="15" y="65" width="65" height="65" fill="#ffeaa7" stroke="#fff" stroke-width="3"/>
    <line x1="15" y1="97" x2="80" y2="97" stroke="#1a2b5f" stroke-width="2"/>
    <rect x="90" y="80" width="50" height="50" fill="#fff8f3" stroke="#fff" stroke-width="3"/>
    <rect x="150" y="90" width="35" height="40" fill="#e8ddd4" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Brand text -->
  <text x="256" y="380" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#fff" text-anchor="middle">TOPBUDGETMOVE</text>
  <text x="256" y="415" font-family="Arial, sans-serif" font-size="22" font-weight="500" fill="#fff" text-anchor="middle" opacity="0.9">Flat Rate Moving</text>
</svg>
