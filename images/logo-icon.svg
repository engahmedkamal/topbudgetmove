<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="iconTruck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
  </defs>

  <!-- Truck -->
  <g transform="translate(3, 12)">
    <!-- Truck body -->
    <rect x="0" y="14" width="32" height="18" rx="2" fill="url(#iconTruck)"/>
    <!-- Truck cabin -->
    <path d="M32 18 L32 32 L46 32 L46 24 L40 18 Z" fill="url(#iconTruck)"/>
    <!-- Cabin window -->
    <path d="M34 20 L34 28 L43 28 L43 23 L38 20 Z" fill="#a8d4ff"/>
    <!-- Wheels -->
    <circle cx="10" cy="34" r="5" fill="#f5734a"/>
    <circle cx="10" cy="34" r="2.5" fill="#fff"/>
    <circle cx="40" cy="34" r="5" fill="#f5734a"/>
    <circle cx="40" cy="34" r="2.5" fill="#fff"/>
    <!-- Moving box -->
    <rect x="4" y="18" width="11" height="11" fill="#ffeaa7" stroke="#fff" stroke-width="1"/>
    <rect x="17" y="20" width="9" height="9" fill="#fff8f3" stroke="#fff" stroke-width="1"/>
  </g>
</svg>
