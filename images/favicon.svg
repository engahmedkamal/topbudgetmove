<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f5734a"/>
  <!-- Truck body -->
  <rect x="8" y="24" width="32" height="18" rx="2" fill="url(#truckGrad)"/>
  <!-- Truck cabin -->
  <path d="M40 28 L40 42 L54 42 L54 34 L48 28 Z" fill="url(#truckGrad)"/>
  <!-- Cabin window -->
  <path d="M42 30 L42 36 L50 36 L50 32 L46 30 Z" fill="#a8d4ff"/>
  <!-- Wheels -->
  <circle cx="18" cy="44" r="5" fill="#333"/>
  <circle cx="18" cy="44" r="2.5" fill="#666"/>
  <circle cx="46" cy="44" r="5" fill="#333"/>
  <circle cx="46" cy="44" r="2.5" fill="#666"/>
  <!-- Moving box on truck -->
  <rect x="12" y="28" width="10" height="10" fill="#ffeaa7" stroke="#1a2b5f" stroke-width="1"/>
  <line x1="12" y1="33" x2="22" y2="33" stroke="#1a2b5f" stroke-width="0.5"/>
  <!-- Second box -->
  <rect x="24" y="30" width="8" height="8" fill="#fff8f3" stroke="#1a2b5f" stroke-width="1"/>
</svg>
