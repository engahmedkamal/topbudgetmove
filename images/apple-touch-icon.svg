<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5734a"/>
      <stop offset="100%" style="stop-color:#e55a2f"/>
    </linearGradient>
    <linearGradient id="truckGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b5f"/>
      <stop offset="100%" style="stop-color:#0f1a3d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>

  <!-- Truck centered -->
  <g transform="translate(25, 50)">
    <!-- Truck body -->
    <rect x="0" y="20" width="80" height="45" rx="4" fill="url(#truckGrad2)"/>
    <!-- Truck cabin -->
    <path d="M80 30 L80 65 L115 65 L115 45 L98 30 Z" fill="url(#truckGrad2)"/>
    <!-- Cabin window -->
    <path d="M84 35 L84 55 L108 55 L108 44 L96 35 Z" fill="#a8d4ff"/>
    <!-- Wheels -->
    <circle cx="25" cy="70" r="12" fill="#333"/>
    <circle cx="25" cy="70" r="6" fill="#777"/>
    <circle cx="100" cy="70" r="12" fill="#333"/>
    <circle cx="100" cy="70" r="6" fill="#777"/>
    <!-- Moving boxes -->
    <rect x="8" y="28" width="25" height="25" fill="#ffeaa7" stroke="#fff" stroke-width="1.5"/>
    <line x1="8" y1="40" x2="33" y2="40" stroke="#1a2b5f" stroke-width="1"/>
    <rect x="38" y="35" width="20" height="18" fill="#fff8f3" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Brand text at bottom -->
  <text x="90" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">TOPBUDGETMOVE</text>
</svg>
